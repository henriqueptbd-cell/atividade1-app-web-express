<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/main.css">
    <title>DSM | Login</title>
</head>

<body>
    <main class="card">
        <h1 class="title">Login</h1>
        <form class="auth-form"action="#" method="post">
            <label for="email">E-mail</label>
            <input type="email" required id="email" placeholder="Seu Email">
            <label for="senha">Senha</label>
            <input type="password" required id="senha" placeholder="Senha"><br>
        </form>
        <div class="actions">
            <button class="btn-line">Entrar</button>
            <a class="btn-line" href="/cadastro">Ir para Cadastro</a>
            <a class="btn-line btn-secundary" href="/">Voltar</a>
        </div>
    </main>
</body>

</html>
